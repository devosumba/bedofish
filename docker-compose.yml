version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: bedofish_postgres
    environment:
      POSTGRES_DB: bedofish
      POSTGRES_USER: bedofish_user
      POSTGRES_PASSWORD: bedofish_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bedofish_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1

volumes:
  postgres_data:
